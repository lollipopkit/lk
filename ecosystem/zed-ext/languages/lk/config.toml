name = "LK"
grammar = "lk"
path_suffixes = ["lk"]
line_comments = ["// "]
block_comment = ["/* ", " */"]
autoclose_before = ";,=)}]"
tab_size = 4
brackets = [
  { start = "{", end = "}", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = true },
  { start = "(", end = ")", close = true, newline = true },
  { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
  { start = "'", end = "'", close = true, newline = false, not_in = ["string"] },
]
