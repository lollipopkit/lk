name: Rust Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    name: ci checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain-file: rust-toolchain.toml
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace --all-features
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: wasm32 smoke (L0 no_std crates + browser playground)
        run: |
          rustup target add wasm32-unknown-unknown
          cargo build -p lk-hal --target wasm32-unknown-unknown
          cargo build -p lk-values --target wasm32-unknown-unknown
          cargo build -p lk-wasm --target wasm32-unknown-unknown
      - name: thumbv7em MCU smoke (bare + alloc L0 profiles on bare-metal ARM)
        # Proves the L0 foundations cross-compile to a real Cortex-M MCU target
        # (no OS, no allocator provided): lk-hal is the `bare` profile, lk-values
        # the `alloc` profile (plan M5.1 profiles / M5.2 MCU smoke).
        run: |
          rustup target add thumbv7em-none-eabi
          cargo build -p lk-hal --target thumbv7em-none-eabi
          cargo build -p lk-values --target thumbv7em-none-eabi
          # Full VM core on bare metal (M5.2): parser/compiler/verifier/
          # executor/GC build with no std anywhere in the crate graph.
          cargo build -p lk-core --no-default-features --target thumbv7em-none-eabi
      - name: lk-core builds as no_std (VM core no-std guard)
        # `--no-default-features` drops the `std` feature, which now makes
        # lk-core `#![no_std]` (+ alloc). The VM core (token/ast/expr/stmt/typ/
        # val/vm/gc/resolve/macro-expansion) compiles without std; std-only
        # leaves (package manager, file imports, proc-macro processes, fs-based
        # macro/module resolution, tokio) are `std`-feature-gated. This guards
        # the no_std profiles (plan M0.7/8, M5.1).
        run: cargo build -p lk-core --no-default-features
