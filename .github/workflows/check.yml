name: Rust Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    name: ci checks
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain-file: rust-toolchain.toml
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace --all-features
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-features -- -D warnings
      - name: wasm32 smoke (L0 no_std crates + browser playground)
        run: |
          rustup target add wasm32-unknown-unknown
          cargo build -p lk-hal --target wasm32-unknown-unknown
          cargo build -p lk-values --target wasm32-unknown-unknown
          cargo build -p lk-wasm --target wasm32-unknown-unknown
      - name: lk-core builds without std-heavy modules (lk-vm-core groundwork)
        # `--no-default-features` drops the `std` feature (the `package`
        # manager: Lk.toml/git/fs) and `async-runtime` (tokio). This guards the
        # future lk-vm-core split (plan M0.7/8) and no-std profiles (M5.1) by
        # proving the VM core does not hard-depend on those std-heavy modules.
        run: cargo build -p lk-core --no-default-features
